name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GEMINI_API_KEY: "dummy"
      ANTHROPIC_API_KEY: "dummy"
      DOCKER_DEFAULT_PLATFORM: linux/amd64
    steps:
      - uses: actions/checkout@v4

      - name: Docker Info
        run: |
          docker info
          docker version
        shell: bash

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install devcontainer CLI and AI tools
        run: |
          npm install -g @devcontainers/cli @google/gemini-cli @anthropic-ai/claude-code

      - name: Prepare mock files for mounts and authentication
        run: |
          mkdir -p ~/.claude ~/.gemini
          # Create dummy credential files to simulate web authentication
          echo '{"dummy": true}' > ~/.gemini/oauth_creds.json
          echo '{"loggedIn": true, "dummy": true}' > ~/.claude/.credentials.json
          touch ~/.claude.json
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"

      - name: Prepare environment
        run: |
          # Ensure GH_TOKEN is set for initializeCommand
          echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" > .devcontainer/.env
          # Mock SSH agent
          # Use a path in the workspace for better Docker bind mount compatibility on Windows
          SSH_SOCK_DIR="${{ github.workspace }}/.ssh"
          mkdir -p "$SSH_SOCK_DIR"
          ssh-agent -a "$SSH_SOCK_DIR/agent.sock" > /dev/null
          # Convert to a path Docker on Windows can understand if necessary
          # But for now let's try absolute path
          echo "SSH_AUTH_SOCK=$SSH_SOCK_DIR/agent.sock" >> $GITHUB_ENV

      - name: Run test.sh
        run: .devcontainer/test.sh
